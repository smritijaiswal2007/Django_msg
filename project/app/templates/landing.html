{% comment %}
{% if messages %}

        {% for i in messages %}
                {{i}}
        {% endfor %}

{% endif %} {% endcomment %}

<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <title>Django Messages</title>

        <!-- Bootstrap 5 CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

        <!-- Heading -->
        <h2 class="text-center mb-4">django messages Demo Session</h2>

        <!-- Buttons -->
        <div class="text-center mb-4">

        <a href="/msg_render/" class="btn btn-primary me-2">
                Msg Render
        </a>

        <a href="/msg_redirect/" class="btn btn-success">
                Message Redirect
        </a>

        </div>


        <!-- Messages Display -->
        {% if messages %}

        {% for i in messages %}

                <div class="alert alert-{{ i.tags }} alert-dismissible fade show" role="alert">

                {{ i }}

                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>

                </div>

        {% endfor %}

        {% endif %}

</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
